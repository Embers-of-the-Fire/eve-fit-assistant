syntax = "proto2";
package collections;

import "categories.proto";
import "dogma_attributes.proto";
import "dogma_units.proto";
import "groups.proto";
import "market_groups.proto";
import "meta_groups.proto";
import "type_materials.proto";
import "types.proto";
import "fit.proto";

message Collection {
  map<uint32, types.Type> types = 1;
  map<uint32, type_materials.TypeMaterial> type_materials = 2;
  map<uint32, categories.Category> categories = 3;
  map<uint32, groups.Group> groups = 4;
  map<uint32, market_groups.MarketGroup> market_groups = 5;
  map<uint32, meta_groups.MetaGroup> meta_groups = 6;
  map<uint32, dogma_units.DogmaUnit> dogma_units = 7;
  map<uint32, dogma_attributes.DogmaAttribute> dogma_attributes = 8;

  map<uint32, fit.Ship> ships = 9;
  map<uint32, fit.Subsystem> subsystems = 10;

  required fit.Slots slots = 11;
}
