syntax = "proto2";
package market_groups;

import "utils.proto";

message MarketGroup {
  required uint32 market_group_id = 1;

  required utils.LocalizationID market_group_name = 2;
  optional utils.LocalizationID description = 3;

  required utils.Icon icon = 4;

  optional uint32 parent_group_id = 5;
  repeated uint32 groups = 6;
  repeated uint32 types = 7;
}
