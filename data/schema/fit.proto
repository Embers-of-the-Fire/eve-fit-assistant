syntax = "proto2";
package fit;

import "utils.proto";

/// The "ship" also contains structures.
message Ship {
  required uint32 type_id = 1;

  required uint32 high_slots = 2;
  required uint32 medium_slots = 3;
  required uint32 low_slots = 4;

  required uint32 rig_slots = 5;
  required uint32 subsystem_slots = 6;
  required uint32 service_slots = 7;

  required uint32 turret_slots = 8;
  required uint32 launcher_slots = 9;
  
  required uint32 fighter_tubes = 10;

  repeated TacticalMode tactical_modes = 11;
}

message Subsystem {
  required uint32 type_id = 1;

  required uint32 high_slots = 2;
  required uint32 medium_slots = 3;
  required uint32 low_slots = 4;

  required uint32 turret_slots = 5;
  required uint32 launcher_slots = 6;

  enum SubsystemType {
    UNKNOWN = 0;
    CORE = 1;
    DEFENSIVE = 2;
    OFFENSIVE = 3;
    PROPULSION = 4;
  }

  required SubsystemType subsystem_type = 7;
}

message TacticalMode {
  enum TacticalModeVariant {
    DEFENSE = 1;
    SPEED = 2;
    TARGET = 3;
  }
  required uint32 type_id = 1;
  required uint32 ship_id = 2;
  required TacticalModeVariant variant = 3;
}
